
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Architect</title>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;width:100%;font-size:16px;"><b>Global Error:</b> ' + e.message + '<br/><pre>' + e.filename + ':' + e.lineno + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;width:100%;font-size:16px;"><b>Unhandled Promise Rejection:</b> ' + e.reason + '</div>';
      });
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  body {
    background-color: #f8fafc;
    color: #0f172a;
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  .dark body {
    background-color: #020617;
    color: #f8fafc;
  }
  .blueprint-grid {
    background-size: 60px 60px;
    background-image: linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
                      linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
  }
  .dark .blueprint-grid {
    background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
  }
  .standard-card {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
  }
  .dark .standard-card {
    background: #0f172a;
    border: 1px solid #1e293b;
  }
  .interactive-orb {
    background: radial-gradient(circle, rgba(124, 58, 237, 0.08) 0%, transparent 70%);
    position: fixed;
    z-index: -1;
  }
</style>
</head>
  <body class="min-h-screen">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
